services:
  - type: web
    name: pedro-portfolio
    env: ruby
    buildCommand: bundle install && bundle exec rails assets:precompile && bundle exec rails db:migrate
    startCommand: bundle exec puma -C config/puma.rb
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      # ADICIONADO: Liga o banco de dados criado abaixo a esta variavel de ambiente
      - key: DATABASE_URL
        fromDatabase:
          name: pedro-portfolio-db
          property: connectionString
      # ADICIONADO: Garante que o Render vai te pedir a Master Key no painel
      - key: RAILS_MASTER_KEY
        sync: false
      - key: API_FOOTBALL_KEY
        sync: false

databases:
  - name: pedro-portfolio-db
    plan: free